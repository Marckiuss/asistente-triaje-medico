services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: triaje_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: triaje_web
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_started
